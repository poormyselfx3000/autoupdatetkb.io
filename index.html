    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            background: #f4f6f9;

        }

        /* Tiêu đề */
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: darkblue;
        }

        /* Card */
        .section {
            background: white;

        }

        /* Tiêu đề từng phần */
        .section h2 {
            margin-bottom: 20px;
            color: #2c3e50;
        }

        /* iframe */
        iframe {
            
            width: 100%;
            border: none;
            height: 270px;
            overflow: hidden;
            pointer-events: none;
            
        }

        /* zoom bảng cho dễ nhìn */
        .zoom {
            transform: scale(1);
            transform-origin: center;
            width: 70%;
        }
        .zoom2 {

        }
